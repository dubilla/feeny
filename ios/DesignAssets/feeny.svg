<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Feeny, the mascot. Source of truth for the compiled SwiftUI paths:
       edit here, preview in a browser, then run ios/tools/svg2shape.py.
       Layer ids become Swift path names; fills here are preview-only
       (the app colors layers from Theme tokens). Absolute commands only. -->

  <!-- sprout: gold leaves + stem growing from the crown -->
  <path id="stem" fill="#8a6d1f"
    d="M 96 62 C 95 52 96 44 101 35 C 103 31 108 33 106 37 C 102 45 101 52 102 61 Z" />
  <path id="leafL" fill="#ffc22e"
    d="M 101 36 C 90 34 80 26 78 14 C 78 11 80 9 83 10 C 94 13 100 24 102 34 Z" />
  <path id="leafR" fill="#ffc22e"
    d="M 103 34 C 106 22 114 12 126 10 C 129 10 131 12 130 15 C 127 27 116 34 105 36 Z" />

  <!-- wings: stubby flippers, rigged to wave -->
  <path id="wingL" fill="#5a41c9"
    d="M 40 122 C 26 124 14 136 12 152 C 12 156 15 159 19 158 C 33 154 42 143 46 132 Z" />
  <path id="wingR" fill="#5a41c9"
    d="M 160 122 C 174 124 186 136 188 152 C 188 156 185 159 181 158 C 167 154 158 143 154 132 Z" />

  <!-- feet -->
  <ellipse id="footL" fill="#fa8c40" cx="80" cy="206" rx="13" ry="8" />
  <ellipse id="footR" fill="#fa8c40" cx="120" cy="206" rx="13" ry="8" />

  <!-- body: the egg silhouette -->
  <path id="body" fill="#7a59eb"
    d="M 100 56 C 141 56 166 95 166 138 C 166 179 137 204 100 204 C 63 204 34 179 34 138 C 34 95 59 56 100 56 Z" />

  <!-- belly patch -->
  <path id="belly" fill="#fff7eb"
    d="M 100 120 C 125 120 140 139 140 161 C 140 186 122 198 100 198 C 78 198 60 186 60 161 C 60 139 75 120 100 120 Z" />

  <!-- face -->
  <ellipse id="eyeL" fill="#ffffff" cx="81" cy="106" rx="14" ry="16" />
  <ellipse id="eyeR" fill="#ffffff" cx="121" cy="106" rx="14" ry="16" />
  <circle id="pupilL" fill="#3d3159" cx="84" cy="108" r="6.5" />
  <circle id="pupilR" fill="#3d3159" cx="118" cy="108" r="6.5" />
  <circle id="cheekL" fill="#fa8c40" opacity="0.35" cx="64" cy="126" r="8" />
  <circle id="cheekR" fill="#fa8c40" opacity="0.35" cx="136" cy="126" r="8" />

  <!-- beak: tiny triangle smile-beak -->
  <path id="beak" fill="#fa8c40"
    d="M 94 122 C 96 118 104 118 106 122 C 104 128 101 130 100 130 C 99 130 96 128 94 122 Z" />
</svg>
