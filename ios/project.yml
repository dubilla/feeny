name: Feeny
options:
  bundleIdPrefix: com.danubilla
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  Feeny:
    type: application
    platform: iOS
    sources:
      - Feeny
      # Offline fallback packs, regenerated by `pnpm export:packs` after seeding.
      - path: BundledPacks
        type: folder
        buildPhase: resources
    info:
      path: Feeny/Info.plist
      properties:
        CFBundleDisplayName: Feeny
        UILaunchScreen: {}
        # All four required for iPad multitasking (App Store validation);
        # landscape-first is a design intent, not a plist restriction.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        APIBaseURL: $(API_BASE_URL)
        # Only standard HTTPS (exempt) — without this every TestFlight build
        # stalls on the manual "Missing Compliance" question in ASC.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2YH555648Y
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  FeenyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FeenyTests
      - path: ../curriculum/fixtures
        type: folder
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Feeny
  FeenyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FeenyUITests
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Feeny
schemes:
  Feeny:
    build:
      targets:
        Feeny: all
        FeenyTests: [test]
        FeenyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [FeenyTests, FeenyUITests]
